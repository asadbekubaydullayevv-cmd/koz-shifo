<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ko'z Shifo Klinikasi</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; height: 100vh; }
.container { text-align: center; }
h1 { font-size: 2.5rem; color: #1a365d; margin-bottom: 0.5rem; }
p { color: #718096; margin-bottom: 3rem; font-size: 1.1rem; }
.buttons { display: flex; gap: 2rem; justify-content: center; }
a { display: block; padding: 2rem 3rem; border-radius: 16px; text-decoration: none; font-size: 1.2rem; font-weight: 600; transition: transform 0.2s; }
a:hover { transform: translateY(-4px); }
.kassa { background: #3182ce; color: white; }
.direktor { background: #2d3748; color: white; }
</style>
</head>
<body>
<div class="container">
  <h1>👁 Ko'z Shifo</h1>
  <p>Klinika boshqaruv tizimi</p>
  <div class="buttons">
    <a href="/kassa" class="kassa">🏥 Kassa</a>
    <a href="/direktor" class="direktor">📊 Direktor</a>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kirish — Ko'z Shifo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;display:flex;justify-content:center;align-items:center;height:100vh}
.card{background:white;border-radius:16px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 4px 20px rgba(0,0,0,0.1)}
h1{font-size:1.5rem;color:#1a365d;margin-bottom:0.5rem;text-align:center}
p{color:#718096;text-align:center;margin-bottom:2rem;font-size:0.9rem}
label{display:block;font-size:0.85rem;color:#718096;margin-bottom:0.3rem;margin-top:1rem}
input{width:100%;padding:0.8rem;border:1px solid #e2e8f0;border-radius:8px;font-size:1rem;outline:none}
input:focus{border-color:#3182ce}
.btn{width:100%;padding:1rem;background:#2d3748;color:white;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:1.5rem}
.btn:hover{background:#1a202c}
.error{background:#fed7d7;color:#c53030;padding:0.8rem;border-radius:8px;text-align:center;margin-top:1rem;font-size:0.9rem}
</style>
</head>
<body>
<div class="card">
  <h1>👁 Ko'z Shifo</h1>
  <p>Tizimga kirish</p>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST" action="/login">
    <label>Foydalanuvchi nomi</label>
    <input type="text" name="username" placeholder="username" required autofocus>
    <label>Parol</label>
    <input type="password" name="parol" placeholder="••••••••" required>
    <button type="submit" class="btn">Kirish →</button>
  </form>
</div>
</body>
</html>
